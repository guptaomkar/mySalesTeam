services:
  # ------------------------------------
  # Backend FastAPI Service
  # ------------------------------------
  - type: web
    name: mysalesteam-backend
    env: python
    # We install playwright chromium because a2wsgi, playwright, pandas are in requirements.txt
    buildCommand: pip install -r requirements.txt && playwright install chromium
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      # You can add other Backend ENV variables here (e.g. MONGO_URI, OPENAI_API_KEY)
      # - key: OPENAI_API_KEY
      #   sync: false # means you'll set it in the Render dashboard

  # ------------------------------------
  # Frontend Static Site Service
  # ------------------------------------
  - type: web
    name: mysalesteam-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: mysalesteam-backend
          type: web
          envVarKey: RENDER_EXTERNAL_URL
    # React/Vite SPA routing fallback
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
